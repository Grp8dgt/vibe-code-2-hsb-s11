<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gửi Phản Hồi — HSB Feedback</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="../shared/style.css">
</head>
<body class="min-h-screen" style="background:#020617;">
    <div id="app-nav"></div>

    <main class="max-w-xl mx-auto px-4 sm:px-6 py-10">

        <!-- Header -->
        <div class="mb-8">
            <h1 class="text-2xl font-semibold text-white mb-1">Gửi Phản Hồi</h1>
            <p class="text-sm" style="color:#64748b;">Chia sẻ trải nghiệm của bạn với chúng tôi</p>
        </div>

        <!-- Success -->
        <div id="success-msg" class="hidden rounded-xl px-4 py-4 mb-6 flex items-start gap-3" style="background:rgba(34,197,94,0.1);border:1px solid rgba(34,197,94,0.2);">
            <svg class="w-5 h-5 mt-0.5 flex-shrink-0" style="color:#4ade80" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                <path stroke-linecap="round" stroke-linejoin="round" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"/>
            </svg>
            <div>
                <p class="font-medium text-sm" style="color:#4ade80;">Gửi thành công!</p>
                <p class="text-sm mt-0.5" style="color:#86efac;">Cảm ơn bạn đã chia sẻ phản hồi với chúng tôi.</p>
            </div>
        </div>

        <!-- Error -->
        <div id="error-msg" class="hidden rounded-xl px-4 py-3 mb-6 text-sm" style="background:rgba(239,68,68,0.1);border:1px solid rgba(239,68,68,0.2);color:#f87171;"></div>

        <!-- Form -->
        <form id="feedback-form" class="rounded-2xl p-6 space-y-5" style="background:#0f172a;border:1px solid rgba(255,255,255,0.08);" novalidate>

            <!-- Name -->
            <div>
                <label for="name" class="block text-sm font-medium mb-1.5" style="color:#94a3b8;">
                    Họ và tên <span class="font-normal text-xs" style="color:#475569;">(không bắt buộc)</span>
                </label>
                <input type="text" id="name" name="name" class="dark-input"
                    placeholder="Nhập họ và tên của bạn">
            </div>

            <!-- Location -->
            <div>
                <label for="location" class="block text-sm font-medium mb-1.5" style="color:#94a3b8;">Địa điểm</label>
                <select id="location" name="location" class="dark-input" style="cursor:pointer;">
                    <option value="">-- Chọn địa điểm --</option>
                    <option value="District 1">District 1</option>
                    <option value="District 3">District 3</option>
                    <option value="Thao Dien">Thao Dien</option>
                </select>
            </div>

            <!-- Rating -->
            <div>
                <span class="block text-sm font-medium mb-2" style="color:#94a3b8;">
                    Đánh giá <span style="color:#ef4444;">*</span>
                </span>
                <div id="star-container" class="flex gap-1">
                    <button type="button" data-value="1" class="star" aria-label="1 sao">&#9733;</button>
                    <button type="button" data-value="2" class="star" aria-label="2 sao">&#9733;</button>
                    <button type="button" data-value="3" class="star" aria-label="3 sao">&#9733;</button>
                    <button type="button" data-value="4" class="star" aria-label="4 sao">&#9733;</button>
                    <button type="button" data-value="5" class="star" aria-label="5 sao">&#9733;</button>
                </div>
                <input type="hidden" id="rating" value="">
                <p id="rating-error" class="hidden text-xs mt-1.5" style="color:#f87171;">Vui lòng chọn đánh giá.</p>
            </div>

            <!-- Comment -->
            <div>
                <label for="comment" class="block text-sm font-medium mb-1.5" style="color:#94a3b8;">
                    Nhận xét <span style="color:#ef4444;">*</span>
                </label>
                <textarea id="comment" name="comment" rows="4" class="dark-input resize-y"
                    placeholder="Nhập nhận xét của bạn..."></textarea>
                <p id="comment-error" class="hidden text-xs mt-1.5" style="color:#f87171;">Vui lòng nhập nhận xét.</p>
            </div>

            <!-- Submit -->
            <button type="submit" id="submit-btn"
                class="w-full py-2.5 rounded-xl text-sm font-semibold transition-colors duration-150 cursor-pointer focus:outline-none focus:ring-2 focus:ring-green-500 focus:ring-offset-2"
                style="background:#22c55e;color:#fff;focus-ring-offset-color:#0f172a;">
                Gửi Phản Hồi
            </button>
        </form>
    </main>

    <script src="../shared/nav.js"></script>
    <script type="module">
        import { db } from '../shared/firebase.js';
        import { collection, addDoc } from "https://www.gstatic.com/firebasejs/11.9.0/firebase-firestore.js";

        const stars      = document.querySelectorAll('.star');
        const ratingInput = document.getElementById('rating');
        const submitBtn  = document.getElementById('submit-btn');

        function paintStars(value) {
            stars.forEach(s => {
                const filled = parseInt(s.dataset.value) <= value;
                s.style.color = filled ? '#facc15' : '#334155';
                s.classList.toggle('active', filled);
            });
        }

        stars.forEach(star => {
            star.addEventListener('click', () => {
                ratingInput.value = star.dataset.value;
                paintStars(parseInt(star.dataset.value));
                document.getElementById('rating-error').classList.add('hidden');
            });
            star.addEventListener('mouseenter', () => paintStars(parseInt(star.dataset.value)));
            star.addEventListener('mouseleave', () => paintStars(parseInt(ratingInput.value) || 0));
        });

        document.getElementById('comment').addEventListener('input', function () {
            if (this.value.trim()) document.getElementById('comment-error').classList.add('hidden');
        });

        submitBtn.addEventListener('mouseover', () => { if (!submitBtn.disabled) submitBtn.style.background = '#16a34a'; });
        submitBtn.addEventListener('mouseout',  () => { if (!submitBtn.disabled) submitBtn.style.background = '#22c55e'; });

        document.getElementById('feedback-form').addEventListener('submit', async function (e) {
            e.preventDefault();
            let valid = true;

            if (!ratingInput.value) {
                document.getElementById('rating-error').classList.remove('hidden');
                valid = false;
            }

            const commentEl = document.getElementById('comment');
            if (!commentEl.value.trim()) {
                document.getElementById('comment-error').classList.remove('hidden');
                valid = false;
            }

            if (!valid) return;

            const entry = {
                name:      document.getElementById('name').value.trim(),
                location:  document.getElementById('location').value,
                rating:    parseInt(ratingInput.value),
                comment:   commentEl.value.trim(),
                timestamp: new Date().toISOString()
            };

            submitBtn.disabled = true;
            submitBtn.textContent = 'Đang gửi...';
            submitBtn.style.opacity = '0.6';

            const errorEl = document.getElementById('error-msg');
            errorEl.classList.add('hidden');

            try {
                await addDoc(collection(db, 'feedbackEntries'), entry);

                this.reset();
                ratingInput.value = '';
                paintStars(0);

                document.getElementById('success-msg').classList.remove('hidden');
                window.scrollTo({ top: 0, behavior: 'smooth' });
            } catch (err) {
                console.error(err);
                errorEl.innerHTML = 'Lỗi gửi phản hồi'
                    + (err.code ? ' (<b>' + err.code + '</b>)' : '')
                    + ': ' + err.message;
                errorEl.classList.remove('hidden');
                window.scrollTo({ top: 0, behavior: 'smooth' });
            } finally {
                submitBtn.disabled = false;
                submitBtn.style.opacity = '1';
                submitBtn.textContent = 'Gửi Phản Hồi';
            }
        });
    </script>
</body>
</html>
