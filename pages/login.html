<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng Nhập Quản Trị</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 min-h-screen flex items-center justify-center">

    <div class="bg-white rounded-lg shadow p-8 w-full max-w-sm">
        <h1 class="text-xl font-bold text-gray-800 mb-6 text-center">Đăng Nhập Quản Trị</h1>

        <div id="error-msg" class="hidden bg-red-100 text-red-700 border border-red-300 rounded px-4 py-3 mb-4 text-sm"></div>

        <!-- Google Sign-In -->
        <button id="btn-google"
            class="w-full flex items-center justify-center gap-3 border border-gray-300 rounded px-4 py-2 text-sm font-medium text-gray-700 hover:bg-gray-50 transition-colors mb-4">
            <svg width="18" height="18" viewBox="0 0 48 48">
                <path fill="#4285F4" d="M44.5 20H24v8.5h11.8C34.7 33.9 29.9 37 24 37c-7.2 0-13-5.8-13-13s5.8-13 13-13c3.1 0 5.9 1.1 8.1 2.9l6.4-6.4C34.6 5.1 29.6 3 24 3 12.4 3 3 12.4 3 24s9.4 21 21 21c10.5 0 20-7.6 20-21 0-1.3-.2-2.7-.5-4z"/>
                <path fill="#34A853" d="M6.3 14.7l7 5.1C15 16.1 19.1 13 24 13c3.1 0 5.9 1.1 8.1 2.9l6.4-6.4C34.6 5.1 29.6 3 24 3c-7.6 0-14.2 4.2-17.7 10.7z" transform="translate(0,1)"/>
                <path fill="#FBBC05" d="M24 45c5.8 0 10.7-1.9 14.3-5.2l-6.6-5.4C29.8 36.1 27 37 24 37c-5.8 0-10.7-3.1-11.8-8.5l-7 5.4C8.3 40.7 15.6 45 24 45z" transform="translate(0,-1)"/>
                <path fill="#EA4335" d="M44.5 20H24v8.5h11.8c-.6 2.7-2.3 5-4.8 6.4l6.6 5.4c3.9-3.6 6.4-8.9 6.4-15.3 0-1.3-.2-2.7-.5-4z" transform="translate(0,0)"/>
            </svg>
            Đăng nhập với Google
        </button>

        <!-- Divider -->
        <div class="flex items-center gap-3 mb-4">
            <hr class="flex-1 border-gray-200">
            <span class="text-xs text-gray-400">hoặc</span>
            <hr class="flex-1 border-gray-200">
        </div>

        <!-- Email/Password -->
        <form id="login-form" class="space-y-4" novalidate>
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Email</label>
                <input type="email" id="email" required
                    class="w-full border border-gray-300 rounded px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500"
                    placeholder="admin@example.com">
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Mật khẩu</label>
                <input type="password" id="password" required
                    class="w-full border border-gray-300 rounded px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500"
                    placeholder="••••••••">
            </div>
            <button type="submit"
                class="w-full bg-blue-700 text-white font-semibold py-2 rounded hover:bg-blue-800 transition-colors">
                Đăng Nhập
            </button>
        </form>
    </div>

    <script type="module">
        import { auth } from '../shared/firebase.js';
        import {
            signInWithEmailAndPassword,
            signInWithPopup,
            GoogleAuthProvider,
            onAuthStateChanged
        } from "https://www.gstatic.com/firebasejs/11.9.0/firebase-auth.js";

        // Already signed in → go straight to admin
        onAuthStateChanged(auth, user => {
            if (user) window.location.href = 'admin.html';
        });

        // Google Sign-In
        document.getElementById('btn-google').addEventListener('click', async () => {
            const errorEl = document.getElementById('error-msg');
            errorEl.classList.add('hidden');
            try {
                await signInWithPopup(auth, new GoogleAuthProvider());
                window.location.href = 'admin.html';
            } catch (err) {
                if (err.code !== 'auth/popup-closed-by-user') {
                    errorEl.textContent = 'Đăng nhập Google thất bại. Vui lòng thử lại.';
                    errorEl.classList.remove('hidden');
                }
            }
        });

        // Email/Password Sign-In
        document.getElementById('login-form').addEventListener('submit', async function (e) {
            e.preventDefault();
            const email    = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;
            const errorEl  = document.getElementById('error-msg');
            const btn      = this.querySelector('button[type="submit"]');

            errorEl.classList.add('hidden');
            btn.disabled = true;
            btn.textContent = 'Đang đăng nhập...';

            try {
                await signInWithEmailAndPassword(auth, email, password);
                window.location.href = 'admin.html';
            } catch (err) {
                errorEl.textContent = 'Email hoặc mật khẩu không đúng.';
                errorEl.classList.remove('hidden');
            } finally {
                btn.disabled = false;
                btn.textContent = 'Đăng Nhập';
            }
        });
    </script>
</body>
</html>
