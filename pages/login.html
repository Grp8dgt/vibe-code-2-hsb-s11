<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng Nhập Quản Trị</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 min-h-screen flex items-center justify-center">

    <div class="bg-white rounded-lg shadow p-8 w-full max-w-sm">
        <h1 class="text-xl font-bold text-gray-800 mb-6 text-center">Đăng Nhập Quản Trị</h1>

        <div id="error-msg" class="hidden bg-red-100 text-red-700 border border-red-300 rounded px-4 py-3 mb-4 text-sm"></div>

        <form id="login-form" class="space-y-4" novalidate>
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Email</label>
                <input type="email" id="email" required
                    class="w-full border border-gray-300 rounded px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500"
                    placeholder="admin@example.com">
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Mật khẩu</label>
                <input type="password" id="password" required
                    class="w-full border border-gray-300 rounded px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500"
                    placeholder="••••••••">
            </div>
            <button type="submit"
                class="w-full bg-blue-700 text-white font-semibold py-2 rounded hover:bg-blue-800 transition-colors">
                Đăng Nhập
            </button>
        </form>
    </div>

    <script type="module">
        import { auth } from '../shared/firebase.js';
        import { signInWithEmailAndPassword, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.9.0/firebase-auth.js";

        // Already signed in → go straight to admin
        onAuthStateChanged(auth, user => {
            if (user) window.location.href = 'admin.html';
        });

        document.getElementById('login-form').addEventListener('submit', async function (e) {
            e.preventDefault();
            const email    = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;
            const errorEl  = document.getElementById('error-msg');
            const btn      = this.querySelector('button[type="submit"]');

            errorEl.classList.add('hidden');
            btn.disabled = true;
            btn.textContent = 'Đang đăng nhập...';

            try {
                await signInWithEmailAndPassword(auth, email, password);
                window.location.href = 'admin.html';
            } catch (err) {
                errorEl.textContent = 'Email hoặc mật khẩu không đúng.';
                errorEl.classList.remove('hidden');
            } finally {
                btn.disabled = false;
                btn.textContent = 'Đăng Nhập';
            }
        });
    </script>
</body>
</html>
