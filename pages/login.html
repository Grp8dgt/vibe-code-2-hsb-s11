<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng Nhập — HSB Feedback</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="../shared/style.css">
</head>
<body class="min-h-screen flex items-center justify-center px-4" style="background:radial-gradient(ellipse 80% 60% at 50% -10%,rgba(34,197,94,0.08) 0%,transparent 60%),#020617;">

    <div class="w-full max-w-sm">

        <!-- Brand -->
        <div class="text-center mb-8">
            <div class="inline-flex items-center justify-center w-14 h-14 rounded-2xl mb-4" style="background:rgba(74,222,128,0.1);border:1px solid rgba(74,222,128,0.2);">
                <svg class="w-7 h-7" style="color:#4ade80" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.75">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M8 10h.01M12 10h.01M16 10h.01M9 16H5a2 2 0 01-2-2V6a2 2 0 012-2h14a2 2 0 012 2v8a2 2 0 01-2 2h-5l-3 3v-3z"/>
                </svg>
            </div>
            <h1 class="text-xl font-semibold text-white mb-1">Bảng Quản Trị</h1>
            <p class="text-sm" style="color:#64748b;">Đăng nhập để truy cập dữ liệu phản hồi</p>
        </div>

        <!-- Card -->
        <div class="rounded-2xl p-6" style="background:#0f172a;border:1px solid rgba(255,255,255,0.08);box-shadow:0 24px 48px rgba(0,0,0,0.4);">

            <div id="error-msg" class="hidden rounded-xl px-4 py-3 mb-5 text-sm leading-relaxed" style="background:rgba(239,68,68,0.1);border:1px solid rgba(239,68,68,0.2);color:#f87171;"></div>

            <button id="btn-google"
                class="w-full flex items-center justify-center gap-3 rounded-xl py-2.5 px-4 text-sm font-medium cursor-pointer transition-colors duration-150 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:ring-offset-2"
                style="background:#ffffff;color:#1e293b;focus-ring-offset-color:#0f172a;">
                <svg width="18" height="18" viewBox="0 0 48 48" style="flex-shrink:0">
                    <path fill="#4285F4" d="M44.5 20H24v8.5h11.8C34.7 33.9 29.9 37 24 37c-7.2 0-13-5.8-13-13s5.8-13 13-13c3.1 0 5.9 1.1 8.1 2.9l6.4-6.4C34.6 5.1 29.6 3 24 3 12.4 3 3 12.4 3 24s9.4 21 21 21c10.5 0 20-7.6 20-21 0-1.3-.2-2.7-.5-4z"/>
                    <path fill="#34A853" d="M6.3 14.7l7 5.1C15 16.1 19.1 13 24 13c3.1 0 5.9 1.1 8.1 2.9l6.4-6.4C34.6 5.1 29.6 3 24 3c-7.6 0-14.2 4.2-17.7 10.7z" transform="translate(0,1)"/>
                    <path fill="#FBBC05" d="M24 45c5.8 0 10.7-1.9 14.3-5.2l-6.6-5.4C29.8 36.1 27 37 24 37c-5.8 0-10.7-3.1-11.8-8.5l-7 5.4C8.3 40.7 15.6 45 24 45z" transform="translate(0,-1)"/>
                    <path fill="#EA4335" d="M44.5 20H24v8.5h11.8c-.6 2.7-2.3 5-4.8 6.4l6.6 5.4c3.9-3.6 6.4-8.9 6.4-15.3 0-1.3-.2-2.7-.5-4z"/>
                </svg>
                Đăng nhập với Google
            </button>

            <p class="text-center text-xs mt-4" style="color:#334155;">
                Chỉ dành cho tài khoản <span style="color:#64748b;">@hsb.edu.vn</span> được cấp quyền
            </p>
        </div>
    </div>

    <script type="module">
        import { auth, db } from '../shared/firebase.js';
        import { signInWithPopup, GoogleAuthProvider, signOut } from "https://www.gstatic.com/firebasejs/11.9.0/firebase-auth.js";
        import { doc, getDoc } from "https://www.gstatic.com/firebasejs/11.9.0/firebase-firestore.js";

        const ALLOWED_DOMAIN = 'hsb.edu.vn';
        const errorEl = document.getElementById('error-msg');
        const btn     = document.getElementById('btn-google');

        btn.addEventListener('mouseover', () => btn.style.background = '#f1f5f9');
        btn.addEventListener('mouseout',  () => btn.style.background = '#ffffff');

        btn.addEventListener('click', async () => {
            errorEl.classList.add('hidden');
            btn.disabled = true;
            btn.textContent = 'Đang đăng nhập...';
            btn.style.opacity = '0.7';

            try {
                const { user } = await signInWithPopup(auth, new GoogleAuthProvider());

                if (!user.email.endsWith('@' + ALLOWED_DOMAIN)) {
                    await signOut(auth);
                    errorEl.innerHTML = 'Chỉ tài khoản <b>@' + ALLOWED_DOMAIN + '</b> mới có quyền truy cập.<br>Email của bạn: <b>' + user.email + '</b>';
                    errorEl.classList.remove('hidden');
                    return;
                }

                const adminSnap = await getDoc(doc(db, 'admins', user.email));
                if (!adminSnap.exists()) {
                    await signOut(auth);
                    errorEl.innerHTML = 'Tài khoản <b>' + user.email + '</b> không có quyền truy cập hệ thống quản trị.';
                    errorEl.classList.remove('hidden');
                    return;
                }

                window.location.href = '/admin';
            } catch (err) {
                if (err.code !== 'auth/popup-closed-by-user') {
                    errorEl.innerHTML = 'Đăng nhập thất bại'
                        + (err.code ? ' (<b>' + err.code + '</b>)' : '')
                        + ': ' + err.message;
                    errorEl.classList.remove('hidden');
                }
            } finally {
                btn.disabled = false;
                btn.style.opacity = '1';
                btn.innerHTML = `<svg width="18" height="18" viewBox="0 0 48 48" style="flex-shrink:0"><path fill="#4285F4" d="M44.5 20H24v8.5h11.8C34.7 33.9 29.9 37 24 37c-7.2 0-13-5.8-13-13s5.8-13 13-13c3.1 0 5.9 1.1 8.1 2.9l6.4-6.4C34.6 5.1 29.6 3 24 3 12.4 3 3 12.4 3 24s9.4 21 21 21c10.5 0 20-7.6 20-21 0-1.3-.2-2.7-.5-4z"/><path fill="#34A853" d="M6.3 14.7l7 5.1C15 16.1 19.1 13 24 13c3.1 0 5.9 1.1 8.1 2.9l6.4-6.4C34.6 5.1 29.6 3 24 3c-7.6 0-14.2 4.2-17.7 10.7z" transform="translate(0,1)"/><path fill="#FBBC05" d="M24 45c5.8 0 10.7-1.9 14.3-5.2l-6.6-5.4C29.8 36.1 27 37 24 37c-5.8 0-10.7-3.1-11.8-8.5l-7 5.4C8.3 40.7 15.6 45 24 45z" transform="translate(0,-1)"/><path fill="#EA4335" d="M44.5 20H24v8.5h11.8c-.6 2.7-2.3 5-4.8 6.4l6.6 5.4c3.9-3.6 6.4-8.9 6.4-15.3 0-1.3-.2-2.7-.5-4z"/></svg> Đăng nhập với Google`;
            }
        });
    </script>
</body>
</html>
