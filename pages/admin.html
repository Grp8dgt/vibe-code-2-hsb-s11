<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quản Trị</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="../shared/style.css">
</head>
<body class="bg-gray-50 min-h-screen">
    <div id="app-nav"></div>
    <div id="auth-loading" class="flex items-center justify-center min-h-screen">
        <p class="text-gray-400 text-sm">Đang kiểm tra đăng nhập...</p>
    </div>
    <main id="main-content" class="hidden max-w-5xl mx-auto px-6 py-10">
        <div class="flex items-center justify-between mb-6">
            <h1 class="text-2xl font-bold text-gray-800">Quản Trị</h1>
            <button id="btn-logout"
                class="text-sm text-gray-500 hover:text-red-600 border border-gray-300 hover:border-red-400 px-3 py-1 rounded transition-colors">
                Đăng xuất
            </button>
        </div>

        <!-- Filters -->
        <div class="bg-white rounded-lg shadow p-4 mb-6 flex flex-wrap gap-4 items-end">
            <div>
                <label class="block text-xs font-medium text-gray-600 mb-1">Địa điểm</label>
                <select id="f-location" class="border border-gray-300 rounded px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500">
                    <option value="">Tất cả địa điểm</option>
                    <option value="District 1">District 1</option>
                    <option value="District 3">District 3</option>
                    <option value="Thao Dien">Thao Dien</option>
                </select>
            </div>
            <div>
                <label class="block text-xs font-medium text-gray-600 mb-1">Đánh giá tối thiểu</label>
                <select id="f-rating" class="border border-gray-300 rounded px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500">
                    <option value="1">★ 1 trở lên</option>
                    <option value="2">★★ 2 trở lên</option>
                    <option value="3">★★★ 3 trở lên</option>
                    <option value="4">★★★★ 4 trở lên</option>
                    <option value="5">★★★★★ 5 sao</option>
                </select>
            </div>
            <div>
                <label class="block text-xs font-medium text-gray-600 mb-1">Từ ngày</label>
                <input type="date" id="f-from" class="border border-gray-300 rounded px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500">
            </div>
            <div>
                <label class="block text-xs font-medium text-gray-600 mb-1">Đến ngày</label>
                <input type="date" id="f-to" class="border border-gray-300 rounded px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500">
            </div>
        </div>

        <!-- Count + Export -->
        <div class="flex items-center justify-between mb-3">
            <p id="row-count" class="text-sm text-gray-500"></p>
            <button id="btn-export"
                class="bg-green-600 text-white text-sm font-medium px-4 py-2 rounded hover:bg-green-700 transition-colors">
                Xuất CSV
            </button>
        </div>

        <!-- Table -->
        <div id="table-container"></div>
    </main>

    <script src="../shared/nav.js"></script>
    <script type="module">
        import { db, auth } from '../shared/firebase.js';
        import { onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/11.9.0/firebase-auth.js";
        import { doc, getDoc, collection, getDocs, query, orderBy } from "https://www.gstatic.com/firebasejs/11.9.0/firebase-firestore.js";

        // Check auth before showing anything
        const user = await new Promise(resolve => {
            const unsub = onAuthStateChanged(auth, u => { unsub(); resolve(u); });
        });

        if (!user || !user.email.endsWith('@hsb.edu.vn')) {
            if (user) await signOut(auth);
            window.location.href = '/login';
            throw new Error('redirect');
        }

        const adminSnap = await getDoc(doc(db, 'admins', user.email));
        if (!adminSnap.exists()) {
            await signOut(auth);
            window.location.href = '/login';
            throw new Error('redirect');
        }

        document.getElementById('auth-loading').classList.add('hidden');
        document.getElementById('main-content').classList.remove('hidden');

        document.getElementById('btn-logout').addEventListener('click', async () => {
            await signOut(auth);
            window.location.href = '/login';
        });

        function formatDate(iso) {
            const d = new Date(iso);
            const dd  = String(d.getDate()).padStart(2, '0');
            const mm  = String(d.getMonth() + 1).padStart(2, '0');
            const hh  = String(d.getHours()).padStart(2, '0');
            const min = String(d.getMinutes()).padStart(2, '0');
            return `${dd}/${mm}/${d.getFullYear()} ${hh}:${min}`;
        }

        function renderStars(rating) {
            return '★'.repeat(rating) + '☆'.repeat(5 - rating);
        }

        function rowBg(rating) {
            if (rating <= 2) return 'bg-red-100';
            if (rating === 3) return 'bg-yellow-100';
            return 'bg-green-100';
        }

        function dayStart(str) { const d = new Date(str); d.setHours(0,0,0,0); return d; }
        function dayEnd(str)   { const d = new Date(str); d.setHours(23,59,59,999); return d; }

        const container = document.getElementById('table-container');
        container.innerHTML = '<p class="text-gray-500 text-sm">Đang tải...</p>';

        let allEntries = [];
        let currentFiltered = [];

        try {
            const snapshot = await getDocs(query(collection(db, 'feedbackEntries'), orderBy('timestamp', 'desc')));
            allEntries = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
        } catch (err) {
            console.error(err);
            container.innerHTML = '<p class="text-red-500 text-sm">Lỗi tải dữ liệu: <b>' + err.code + '</b> — ' + err.message + '</p>';
        }

        function applyFilters() {
            const loc     = document.getElementById('f-location').value;
            const minRat  = parseInt(document.getElementById('f-rating').value);
            const fromVal = document.getElementById('f-from').value;
            const toVal   = document.getElementById('f-to').value;

            currentFiltered = allEntries.filter(e => {
                if (loc && e.location !== loc) return false;
                if (e.rating < minRat) return false;
                const ts = new Date(e.timestamp);
                if (fromVal && ts < dayStart(fromVal)) return false;
                if (toVal   && ts > dayEnd(toVal))     return false;
                return true;
            });

            const countEl = document.getElementById('row-count');

            if (allEntries.length === 0) {
                countEl.textContent = '';
                container.innerHTML = '<p class="text-gray-500 text-sm">Chưa có phản hồi nào. (No feedback yet)</p>';
                return;
            }

            countEl.textContent = `Hiển thị ${currentFiltered.length} / ${allEntries.length} phản hồi`;

            if (currentFiltered.length === 0) {
                container.innerHTML = '<p class="text-gray-500 text-sm">Không có phản hồi nào khớp với bộ lọc. (No feedback matches your filters)</p>';
                return;
            }

            const rows = currentFiltered.map(e => `
                <tr class="border-t border-gray-200 ${rowBg(e.rating)}">
                    <td class="px-4 py-3 text-sm text-gray-600 whitespace-nowrap">${formatDate(e.timestamp)}</td>
                    <td class="px-4 py-3 text-sm text-gray-700">${e.location || '—'}</td>
                    <td class="px-4 py-3 text-sm text-yellow-500 whitespace-nowrap tracking-tight">${renderStars(e.rating)}</td>
                    <td class="px-4 py-3 text-sm text-gray-700">${e.name || '—'}</td>
                    <td class="px-4 py-3 text-sm text-gray-700">${e.comment}</td>
                </tr>`).join('');

            container.innerHTML = `
                <div class="overflow-x-auto rounded-lg shadow">
                    <table class="min-w-full bg-white text-left">
                        <thead class="bg-blue-700 text-white text-xs uppercase tracking-wider">
                            <tr>
                                <th class="px-4 py-3">Ngày</th>
                                <th class="px-4 py-3">Địa điểm</th>
                                <th class="px-4 py-3">Đánh giá</th>
                                <th class="px-4 py-3">Tên</th>
                                <th class="px-4 py-3">Nhận xét</th>
                            </tr>
                        </thead>
                        <tbody>${rows}</tbody>
                    </table>
                </div>`;
        }

        ['f-location', 'f-rating', 'f-from', 'f-to'].forEach(id =>
            document.getElementById(id).addEventListener('change', applyFilters)
        );

        function csvField(val) {
            return '"' + String(val ?? '').replace(/"/g, '""') + '"';
        }

        document.getElementById('btn-export').addEventListener('click', () => {
            if (currentFiltered.length === 0) {
                alert('Nothing to export');
                return;
            }

            const header = 'Date,Location,Rating,Name,Comment';
            const lines = currentFiltered.map(e =>
                [
                    formatDate(e.timestamp),
                    e.location || '',
                    e.rating,
                    e.name || '',
                    csvField(e.comment)
                ].join(',')
            );

            const BOM = '﻿';
            const csv = BOM + [header, ...lines].join('\r\n');
            const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
            const url = URL.createObjectURL(blob);

            const today = new Date().toISOString().slice(0, 10);
            const a = document.createElement('a');
            a.href = url;
            a.download = `feedback-export-${today}.csv`;
            a.click();
            URL.revokeObjectURL(url);
        });

        applyFilters();
    </script>
</body>
</html>
